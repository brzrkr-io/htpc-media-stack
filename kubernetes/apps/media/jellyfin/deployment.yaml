---
# Jellyfin - Open source media server
# Streams your movies and TV shows to any device
# Includes hardware transcoding support via VA-API (AMD Radeon 680M)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  labels:
    app: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Grant the container the host's render/video groups so VA-API hardware
      # transcoding works WITHOUT privileged:true (verified GIDs on this host).
      securityContext:
        supplementalGroups:
          - 44   # video  -> /dev/dri/card1
          - 991  # render -> /dev/dri/renderD128 (AMD Radeon 680M, VA-API)
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:latest@sha256:a569ae0bfbd67ca404ae51f54cead7a2522d270179f57b3d12cf80ebff5d683b # {"$imagepolicy": "flux-system:jellyfin"}
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
          ports:
            - containerPort: 8096
              name: web
              protocol: TCP
            - containerPort: 8920
              name: web-https
              protocol: TCP
            - containerPort: 7359
              name: discovery
              protocol: UDP
            - containerPort: 1900
              name: dlna
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: movies
              mountPath: /data/movies
              readOnly: true
            - name: tv
              mountPath: /data/tv
              readOnly: true
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "8000m"
          # Startup probe gives Jellyfin up to 5 min to come up before the
          # liveness probe can kill it — prevents boot-time restart loops.
          startupProbe:
            httpGet:
              path: /health
              port: 8096
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6

      volumes:
        - name: config
          hostPath:
            path: /data/media/config/jellyfin
            type: DirectoryOrCreate
        - name: movies
          hostPath:
            path: /data/media/library/movies
            type: DirectoryOrCreate
        - name: tv
          hostPath:
            path: /data/media/library/tv
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
